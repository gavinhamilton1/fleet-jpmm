apiVersion: ingress.jpmc.com/v1alpha1
kind: Fleet
metadata:
  name: fleet-jpmm
  namespace: ingress-dp
  labels:
    app.kubernetes.io/managed-by: management-api
spec:
  name: "JPMM"
  subdomain: "jpmm.jpm.com"
  gatewayType: mixed
  replicas: 3
  nodes:
    - name: "fleet-jpmm-kong-1"
      index: 1
      gatewayType: "kong"
      datacenter: "us-east-1"
      region: "us-east-1"
      status: "running"
    - name: "fleet-jpmm-envoy-1"
      index: 1
      gatewayType: "envoy"
      datacenter: "us-east-1"
      region: "us-east-1"
      status: "running"
    - name: "fleet-jpmm-envoy-2"
      index: 2
      gatewayType: "envoy"
      datacenter: "us-east-1"
      region: "us-east-1"
      status: "running"
